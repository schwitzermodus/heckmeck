const LANGS=[{code:"de",flag:"🇩🇪",name:"DE"},{code:"en",flag:"🇬🇧",name:"EN"},{code:"no",flag:"🇳🇴",name:"NO"},{code:"vi",flag:"🇻🇳",name:"VI"}];

function scoreQuestion(q,val){return q.reverse?1-val:val;}
function getRawScore(questions,answers){let total=0,count=0;for(const q of questions){const val=answers[q.id];if(val===undefined)continue;total+=scoreQuestion(q,val);count++;}return count===0?0:(total/count)*10;}
function getCategoryScore(catId,questions,answers){const qs=questions.filter(q=>q.cat===catId);let total=0,count=0;for(const q of qs){const val=answers[q.id];if(val===undefined)continue;total+=scoreQuestion(q,val);count++;}return count===0?null:(total/count)*10;}
function getMeter(score,t){return t.meter.find(m=>score<=m.max)||t.meter[t.meter.length-1];}
function getScoringDirection(question,answer,t){const p=question.reverse?answer===0:answer===1;return p?{label:t.towardConv,color:"#e879f9",dir:"right"}:{label:t.towardFree,color:"#60a5fa",dir:"left"};}

function roundRectPath(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function wrapText(ctx,text,x,y,maxWidth,lineHeight){const words=text.split(" ");let line="";for(const word of words){const test=line?line+" "+word:word;if(ctx.measureText(test).width>maxWidth&&line){ctx.fillText(line,x,y);line=word;y+=lineHeight;}else{line=test;}}if(line)ctx.fillText(line,x,y);}
function drawShareCard(meter,name,t){const SIZE=600;const canvas=document.createElement("canvas");canvas.width=SIZE;canvas.height=SIZE;const ctx=canvas.getContext("2d");const bg=ctx.createRadialGradient(SIZE*0.3,0,0,SIZE*0.3,0,SIZE*1.1);bg.addColorStop(0,"#1a2744");bg.addColorStop(1,"#080d18");ctx.fillStyle=bg;ctx.fillRect(0,0,SIZE,SIZE);ctx.strokeStyle=meter.color+"44";ctx.lineWidth=2;ctx.strokeRect(1,1,SIZE-2,SIZE-2);const cx=SIZE/2;let y=60;ctx.font="40px serif";ctx.textAlign="center";ctx.fillText("📏",cx,y);y+=50;ctx.font="bold 13px Georgia,serif";ctx.fillStyle="#475569";ctx.fillText("S P I E S S - O - M E T E R",cx,y);y+=36;if(name){ctx.font="16px Georgia,serif";ctx.fillStyle="#94a3b8";ctx.fillText(name,cx,y);y+=32;}ctx.font="bold 100px Georgia,serif";ctx.fillStyle=meter.color;ctx.fillText(meter.level.toFixed(1),cx,y+80);y+=110;ctx.font="11px Georgia,serif";ctx.fillStyle="#475569";ctx.fillText(t.outOf,cx,y);y+=36;const lw=220,lh=38,lx=cx-lw/2,ly=y;roundRectPath(ctx,lx,ly,lw,lh,19);ctx.fillStyle=meter.color+"22";ctx.fill();ctx.strokeStyle=meter.color+"88";ctx.lineWidth=1;ctx.stroke();ctx.font="bold 15px Georgia,serif";ctx.fillStyle=meter.color;ctx.fillText(meter.label,cx,ly+25);y+=58;const bx=60,by=y,bw=SIZE-120,bh=8;const grad=ctx.createLinearGradient(bx,0,bx+bw,0);grad.addColorStop(0,"#60a5fa");grad.addColorStop(0.25,"#34d399");grad.addColorStop(0.5,"#fbbf24");grad.addColorStop(0.75,"#f97316");grad.addColorStop(1,"#e879f9");roundRectPath(ctx,bx,by,bw,bh,4);ctx.fillStyle=grad;ctx.fill();const dotX=bx+(meter.level/10)*bw;ctx.beginPath();ctx.arc(dotX,by+bh/2,10,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle=meter.color;ctx.lineWidth=3;ctx.stroke();y+=28;ctx.font="11px Georgia,serif";ctx.fillStyle="#475569";ctx.textAlign="left";ctx.fillText(t.freeSpirit,bx,y);ctx.textAlign="right";ctx.fillText(t.conventional,bx+bw,y);y+=36;ctx.textAlign="center";ctx.font="13px Georgia,serif";ctx.fillStyle="#64748b";wrapText(ctx,meter.desc,cx,y,460,20);return canvas;}

const SWIPE_EXIT_DELAY=SWIPE_EXIT_MS;

function SwipeCard({question,catInfo,onSwipe,index,total,isFirst,t}){
  const startX=useRef(null),currentX=useRef(0);
  const locked=useRef(false);
  const [dragging,setDragging]=useState(false);
  const [offset,setOffset]=useState(0);
  const [exiting,setExiting]=useState(null);
  const handleStart=useCallback(x=>{startX.current=x;setDragging(true);},[]);
  const handleMove=useCallback(x=>{if(startX.current===null)return;const dx=x-startX.current;currentX.current=dx;setOffset(dx);},[]);
  const handleEnd=useCallback(()=>{if(locked.current)return;setDragging(false);const dx=currentX.current;if(dx>SWIPE_THRESHOLD){locked.current=true;setExiting("right");setTimeout(()=>{onSwipe(1);locked.current=false;},SWIPE_EXIT_DELAY);}else if(dx<-SWIPE_THRESHOLD){locked.current=true;setExiting("left");setTimeout(()=>{onSwipe(0);locked.current=false;},SWIPE_EXIT_DELAY);}else{setOffset(0);}startX.current=null;currentX.current=0;},[onSwipe]);
  const rotation=offset/18;
  const yesOpacity=Math.min(1,Math.max(0,(offset-20)/40));
  const noOpacity=Math.min(1,Math.max(0,(-offset-20)/40));
  const transformStyle=exiting==="right"?"translateX(110vw) rotate(25deg)":exiting==="left"?"translateX(-110vw) rotate(-25deg)":`translateX(${offset}px) rotate(${rotation}deg)`;
  return(
    <div className={isFirst?"swipe-hint":""} onMouseDown={e=>handleStart(e.clientX)} onMouseMove={e=>{if(dragging)handleMove(e.clientX);}} onMouseUp={handleEnd} onMouseLeave={handleEnd} onTouchStart={e=>{handleStart(e.touches[0].clientX);}} onTouchMove={e=>{e.preventDefault();handleMove(e.touches[0].clientX);}} onTouchEnd={e=>{handleEnd();}} style={{position:"absolute",width:"calc(100% - 48px)",maxWidth:"420px",transform:transformStyle,transition:dragging?"none":`transform ${SWIPE_EXIT_DELAY}ms cubic-bezier(0.25,0.46,0.45,0.94)`,cursor:dragging?"grabbing":"grab",userSelect:"none",touchAction:"none",zIndex:20}}>
      <div style={{background:"linear-gradient(160deg,#1e2d45 0%,#0d1b2e 100%)",border:`1px solid ${offset>20?"rgba(167,139,250,0.4)":offset<-20?"rgba(148,163,184,0.3)":"rgba(255,255,255,0.1)"}`,borderRadius:"20px",padding:"28px 24px 22px",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",minHeight:"280px",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"18px",left:"18px",opacity:yesOpacity,transform:"rotate(-15deg)"}}><div style={{border:`3px solid ${MORE_CLR}`,borderRadius:"8px",padding:"3px 12px",color:MORE_CLR,fontWeight:"900",fontSize:"13px",letterSpacing:"1px"}}>{t.stampYes}</div></div>
        <div style={{position:"absolute",top:"18px",right:"18px",opacity:noOpacity,transform:"rotate(15deg)"}}><div style={{border:`3px solid ${LESS_CLR}`,borderRadius:"8px",padding:"3px 12px",color:LESS_CLR,fontWeight:"900",fontSize:"13px",letterSpacing:"1px"}}>{t.stampNo}</div></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <span style={{fontSize:"11px",background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:"20px",padding:"3px 10px",color:ACCENT}}>{catInfo?.emoji} {catInfo?.label}</span>
          <span style={{fontSize:"11px",color:"#475569"}}>{index+1} / {total}</span>
        </div>
        <p style={{fontSize:"16px",lineHeight:"1.75",color:"#e2e8f0",flex:1,margin:"0 0 10px",fontStyle:"italic"}}>„{question.text}"</p>
        <p style={{fontSize:"12px",lineHeight:"1.5",color:"#475569",margin:"0 0 20px"}}>{question.example}</p>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#2d3f55"}}><span>{t.swipeLeft}</span><span>{t.swipeRight}</span></div>
      </div>
    </div>
  );
}

function TypeComparison({meter,globalScore,t}){
  const [selected,setSelected]=useState(null);
  const typeRanges=[{min:0,max:2,midpoint:1},{min:2,max:4,midpoint:3},{min:4,max:6,midpoint:5},{min:6,max:8,midpoint:7},{min:8,max:10,midpoint:9}];
  const myTypeIndex=t.meter.findIndex(m=>globalScore<=m.max);
  return(
    <div style={{marginBottom:"28px"}}>
      <h3 style={{fontSize:"11px",letterSpacing:"3px",color:"#475569",textTransform:"uppercase",marginBottom:"16px"}}>{t.allTypes}</h3>
      <div style={{position:"relative",marginBottom:"32px"}}>
        <div style={{height:"6px",borderRadius:"3px",background:"linear-gradient(to right,#60a5fa,#34d399,#fbbf24,#f97316,#e879f9)"}}/>
        {t.meter.map((type,i)=>{
          const range=typeRanges[i];
          const pct=(range.midpoint/10)*100;
          const isMe=i===myTypeIndex;
          const isSel=selected===i;
          return(<div key={i} onClick={()=>setSelected(isSel?null:i)} style={{position:"absolute",top:"-8px",left:`calc(${pct}% - 11px)`,width:"22px",height:"22px",borderRadius:"50%",background:isMe?type.color:"#0d1b2e",border:`2px solid ${type.color}`,cursor:"pointer",boxShadow:isMe?`0 0 12px ${type.color}80`:"none",transform:isSel?"scale(1.2)":"scale(1)",transition:"transform 0.15s",zIndex:isMe?10:5,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {isMe&&<span style={{fontSize:"9px",color:"#0d1b2e",fontWeight:"bold"}}>●</span>}
          </div>);
        })}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        {t.meter.map((type,i)=>{
          const isMe=i===myTypeIndex;
          const isSel=selected===i;
          const range=typeRanges[i];
          const show=isMe||isSel;
          return(
            <div key={i} onClick={()=>setSelected(isSel?null:i)} style={{background:isMe?`${type.color}10`:"rgba(255,255,255,0.02)",border:`1px solid ${isMe?type.color+"60":isSel?type.color+"40":"rgba(255,255,255,0.06)"}`,borderRadius:"12px",padding:"12px 16px",cursor:"pointer",opacity:(!isMe&&!isSel&&selected!==null)?0.5:1,transition:"all 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <div style={{width:"10px",height:"10px",borderRadius:"50%",background:type.color,flexShrink:0}}/>
                <span style={{fontSize:"13px",color:isMe?type.color:"#cbd5e1",fontWeight:isMe?"bold":"normal",flex:1}}>{type.label}</span>
                <span style={{fontSize:"11px",color:"#475569"}}>{t.rangeLabel}: {range.min}–{range.max}</span>
                {isMe&&<span style={{fontSize:"10px",background:`${type.color}20`,border:`1px solid ${type.color}60`,borderRadius:"10px",padding:"2px 8px",color:type.color,fontWeight:"bold",whiteSpace:"nowrap"}}>{t.yourType}</span>}
                <span style={{color:"#334155",fontSize:"11px",transform:isSel?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
              </div>
              {show&&(
                <div className="fade-in" style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                  <p style={{fontSize:"12px",color:"#94a3b8",lineHeight:"1.6"}}>{type.desc}</p>
                  {isMe&&(
                    <div style={{marginTop:"8px",display:"flex",alignItems:"center",gap:"8px"}}>
                      <div style={{flex:1,height:"4px",background:"linear-gradient(to right,#60a5fa,#34d399,#fbbf24,#f97316,#e879f9)",borderRadius:"2px",position:"relative"}}>
                        <div style={{position:"absolute",top:"-5px",left:`calc(${(globalScore/10)*100}% - 6px)`,width:"12px",height:"12px",background:"#fff",borderRadius:"50%",border:`2px solid ${type.color}`}}/>
                      </div>
                      <span style={{fontSize:"11px",color:type.color,whiteSpace:"nowrap",fontWeight:"bold"}}>{globalScore.toFixed(1)}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <input type="text" placeholder={t.namePlaceholder} value={playerName} onChange={e=>setPlayerName(e.target.value)} style={{width:"100%",padding:"11px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",color:"#e2e8f0",fontSize:"14px",fontFamily:"Georgia,serif",outline:"none",textAlign:"center"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",marginBottom:"28px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"14px",padding:"16px 20px",maxWidth:"300px",width:"100%"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",minWidth:"64px"}}><div style={{width:"38px",height:"38px",borderRadius:"50%",background:`${LESS_CLR}15`,border:`2px solid ${LESS_CLR}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",color:LESS_CLR}}>✗</div><span style={{fontSize:"10px",color:LESS_CLR,textAlign:"center",lineHeight:1.3}}>{t.btnLess}</span></div>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",padding:"0 8px"}}><div style={{fontSize:"17px",color:"#2d3f55",letterSpacing:"2px"}}>← →</div><div style={{fontSize:"10px",color:"#2d3f55"}}>{t.orTap}</div></div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",minWidth:"64px"}}><div style={{width:"38px",height:"38px",borderRadius:"50%",background:`${MORE_CLR}15`,border:`2px solid ${MORE_CLR}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",color:MORE_CLR}}>✓</div><span style={{fontSize:"10px",color:MORE_CLR,textAlign:"center",lineHeight:1.3}}>{t.btnMore}</span></div>
          </div>
          <button onClick={()=>setScreen("quiz")} style={{background:`linear-gradient(135deg,${ACCENT},#7c3aed)`,color:"#fff",border:"none",borderRadius:"12px",padding:"13px 40px",fontSize:"15px",fontWeight:"bold",cursor:"pointer",letterSpacing:"1px",boxShadow:`0 6px 24px ${ACCENT}40`}}>{t.startBtn}</button>
        </div>
      )}

      {screen==="quiz"&&current&&(()=>{
        const catInfo=cats.find(c=>c.id===current.cat);
        return(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 24px",position:"relative",overflow:"hidden"}}>
            {[2,1].map(off=>currentIndex+off<total?(<div key={off} style={{position:"absolute",width:"calc(100% - 48px)",maxWidth:"420px",background:"linear-gradient(160deg,#1e2d45,#0d1b2e)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:"20px",height:"280px",zIndex:20-off,transform:`translateY(${off*10}px) scale(${1-off*0.04})`,opacity:1-off*0.15}}/>):null)}
            <SwipeCard key={`${lang}-${currentIndex}`} question={current} catInfo={catInfo} index={currentIndex} total={total} onSwipe={handleSwipe} isFirst={currentIndex===0} t={t}/>
            <div style={{display:"flex",gap:"24px",marginTop:"310px",zIndex:30,position:"relative",alignItems:"center"}}>
              <button onClick={()=>handleSwipe(0)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",background:"none",border:"none",cursor:"pointer",padding:0}}>
                <div style={{width:"54px",height:"54px",borderRadius:"50%",background:`${LESS_CLR}10`,border:`2px solid ${LESS_CLR}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",color:LESS_CLR}}>✗</div>
                <span style={{fontSize:"10px",color:"#475569",textAlign:"center",maxWidth:"60px",lineHeight:1.3}}>{t.btnLess}</span>
              </button>
              {lastAnswer?<button onClick={handleUndo} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",background:"none",border:"none",cursor:"pointer",padding:0}}><div style={{width:"34px",height:"34px",borderRadius:"50%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#475569"}}>↩</div><span style={{fontSize:"10px",color:"#334155"}}>{t.btnUndo.replace("↩ ","")}</span></button>:<div style={{width:"34px"}}/>}
              <button onClick={()=>handleSwipe(1)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",background:"none",border:"none",cursor:"pointer",padding:0}}>
                <div style={{width:"54px",height:"54px",borderRadius:"50%",background:`${MORE_CLR}10`,border:`2px solid ${MORE_CLR}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",color:MORE_CLR}}>✓</div>
                <span style={{fontSize:"10px",color:"#475569",textAlign:"center",maxWidth:"60px",lineHeight:1.3}}>{t.btnMore}</span>
              </button>
            </div>
          </div>
        );
      })()}

      {screen==="result"&&meter&&(
        <div style={{flex:1,overflowY:"auto",padding:"28px 20px",maxWidth:"560px",margin:"0 auto",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:"28px"}}>
            {playerName&&<div style={{fontSize:"13px",color:"#64748b",marginBottom:"8px"}}>{t.resultFor} {playerName}</div>}
            <div style={{fontSize:"12px",letterSpacing:"3px",color:"#475569",textTransform:"uppercase",marginBottom:"14px"}}>{t.resultTitle}</div>
            <div className="pop-in" style={{background:"rgba(255,255,255,0.02)",border:`2px solid ${meter.color}`,borderRadius:"20px",padding:"32px 20px",marginBottom:"16px",boxShadow:`0 0 50px ${meter.color}20`}}>
              <div style={{fontSize:"64px",fontWeight:"bold",color:meter.color,lineHeight:1,marginBottom:"4px"}}>{globalScore.toFixed(1)}</div>
              <div style={{fontSize:"10px",color:"#475569",letterSpacing:"3px",marginBottom:"12px"}}>{t.outOf}</div>
              <div style={{display:"inline-block",background:`${meter.color}20`,border:`1px solid ${meter.color}60`,borderRadius:"20px",padding:"5px 18px",fontSize:"14px",color:meter.color,fontWeight:"bold",letterSpacing:"1px",marginBottom:"10px"}}>{meter.label}</div>
              <p style={{fontSize:"13px",color:"#94a3b8",lineHeight:"1.7",margin:"0 auto",maxWidth:"300px"}}>{meter.desc}</p>
            </div>
            <div style={{height:"8px",borderRadius:"4px",background:"linear-gradient(to right,#60a5fa,#34d399,#fbbf24,#f97316,#e879f9)",position:"relative",marginBottom:"6px"}}>
              <div style={{position:"absolute",top:"-6px",left:`calc(${(globalScore/10)*100}% - 10px)`,width:"20px",height:"20px",background:"#fff",borderRadius:"50%",border:`3px solid ${meter.color}`,boxShadow:"0 2px 8px rgba(0,0,0,0.5)"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#334155",marginBottom:"20px"}}><span>{t.freeSpirit}</span><span>{t.conventional}</span></div>
            <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={handleCapture} disabled={capturing} style={{background:capturing?"rgba(255,255,255,0.05)":`linear-gradient(135deg,${ACCENT},#7c3aed)`,color:capturing?"#475569":"#fff",border:"none",borderRadius:"10px",padding:"11px 24px",fontSize:"13px",fontWeight:"bold",cursor:capturing?"not-allowed":"pointer",letterSpacing:"0.5px"}}>{capturing?t.saving:t.saveImg}</button>
              {lastAnswer&&(<button onClick={handleUndo} style={{background:"transparent",color:"#475569",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"11px 20px",fontSize:"13px",cursor:"pointer"}}>{t.undoLast}</button>)}
            </div>
          </div>

          <TypeComparison meter={meter} globalScore={globalScore} t={t}/>

          <h3 style={{fontSize:"11px",letterSpacing:"3px",color:"#475569",textTransform:"uppercase",marginBottom:"12px"}}>{t.byCategory}</h3>
          {cats.map(cat=>{
            const s=getCategoryScore(cat.id,questions,answers);
            if(s===null)return null;
            const bc=s<3.5?"#60a5fa":s<6.5?"#fbbf24":"#e879f9";
            const isOpen=expandedCats[cat.id];
            const catQs=questions.filter(q=>q.cat===cat.id);
            return(
              <div key={cat.id} style={{marginBottom:"8px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"12px",overflow:"hidden"}}>
                <div onClick={()=>toggleCat(cat.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",cursor:"pointer"}}>
                  <span style={{fontSize:"13px",color:"#cbd5e1"}}>{cat.emoji} {cat.label}</span>
                  <div style={{display:"flex",alignItems:"center",gap:"10px"}}><span style={{color:bc,fontWeight:"bold",fontSize:"13px"}}>{s.toFixed(1)}</span><span style={{color:"#334155",fontSize:"12px",display:"inline-block",transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span></div>
                </div>
                <div style={{height:"3px",background:"rgba(255,255,255,0.04)",margin:"0 16px 10px"}}><div style={{height:"100%",width:`${(s/10)*100}%`,background:bc,borderRadius:"2px"}}/></div>
                {isOpen&&(
                  <div className="fade-in" style={{borderTop:"1px solid rgba(255,255,255,0.05)",padding:"12px 16px 14px"}}>
                    {catQs.map((q,qi)=>{
                      const ans=answers[q.id];
                      const ansLabel=ans===1?t.ansMore:ans===0?t.ansLess:"–";
                      const ansColor=ans===1?MORE_CLR:ans===0?LESS_CLR:"#475569";
                      const dir=ans!==undefined?getScoringDirection(q,ans,t):null;
                      return(
                        <div key={q.id} style={{marginBottom:qi<catQs.length-1?"14px":0,paddingBottom:qi<catQs.length-1?"14px":0,borderBottom:qi<catQs.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                          <p style={{fontSize:"12px",color:"#64748b",lineHeight:"1.5",fontStyle:"italic",marginBottom:"6px"}}>„{q.text}"</p>
                          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                            <span style={{fontSize:"11px",fontWeight:"bold",color:ansColor,whiteSpace:"nowrap"}}>{ansLabel}</span>
                            {dir&&(<div style={{display:"flex",alignItems:"center",gap:"6px",flex:1}}><div style={{flex:1,height:"4px",borderRadius:"2px",background:"linear-gradient(to right,#60a5fa,#34d399,#fbbf24,#f97316,#e879f9)",position:"relative"}}><div style={{position:"absolute",top:"-4px",left:dir.dir==="right"?"calc(70% - 6px)":"calc(30% - 6px)",width:"12px",height:"12px",background:dir.color,borderRadius:"50%",border:"2px solid #0d1b2e"}}/></div><span style={{fontSize:"10px",color:dir.color,whiteSpace:"nowrap"}}>{dir.label}</span></div>)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}

          <div style={{textAlign:"center",marginTop:"28px",paddingBottom:"24px",display:"flex",gap:"12px",justifyContent:"center"}}>
            {lastAnswer&&(<button onClick={handleUndo} style={{background:"transparent",color:ACCENT,border:`1px solid ${ACCENT}40`,borderRadius:"8px",padding:"10px 20px",fontSize:"13px",cursor:"pointer"}}>{t.undoLastCorr}</button>)}
            <button onClick={resetAll} style={{background:"transparent",color:"#475569",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"8px",padding:"10px 24px",fontSize:"13px",cursor:"pointer"}}>{t.again}</button>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
